name: Download Artifacts Example

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create Build Log
        run: |
          mkdir build-output
          echo "Build completed successfully" > build-output/build-log.txt

      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build-output/

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Build Output
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: downloaded_build

      - name: Display Build Log
        run: cat downloaded_build/build-log.txt